<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filtros</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Listas de Produtos</h1>

    <!--botões-->
    <div class="filtros">
        <button data-categoria="todos">Todos</button>
        <button data-categoria="frutas">Frutas</button>
        <button data-categoria="bebidas">Bebidas</button>
        <button data-categoria="doces">Doces</button>
    </div>

    <!--listas-->
    <div class="lista">

        <div class="item" data-categoria="frutas">
            Maça
        </div>

        <div class="item" data-categoria="bebidas">
            Refrigerante
        </div>

        <div class="item" data-categoria="doces">
            Brigadeiro
        </div>

        <div class="item" data-categoria="frutas">
            Banana
        </div>

    </div>

    <script src="filtro.js" defer></script>
</body>
</html>
